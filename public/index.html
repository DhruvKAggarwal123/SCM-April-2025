<!DOCTYPE html>
<html>
<head>
  <title>Medora Home</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
      text-align: center;
    }
    header {
      background: #6a11cb;
      color: white;
      padding: 1.5rem;
      font-size: 1.5rem;
    }
    main {
      padding: 2rem;
    }
    a {
      display: inline-block;
      margin: 1rem;
      padding: 0.8rem 1.5rem;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    a:hover {
      background: linear-gradient(135deg, #2575fc, #6a11cb);
    }
  </style>
</head>
<body>
  <header>
    Welcome to Medora
  </header>
  <main>
    <a href="register.html">Register</a>
    <a href="login.html">Login</a>
  </main>
</body>
</html>
