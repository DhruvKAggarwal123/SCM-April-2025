<!DOCTYPE html>
<html>
<head>
  <title>Login - Medora</title>
</head>
<body>
  <h2>Login</h2>
  <form id="loginForm">
    <label>Email: <input type="email" name="email" required></label><br>
    <label>Password: <input type="password" name="password" required></label><br>
    <button type="submit">Login</button>
  </form>
  <div id="message"></div>
  <a href="index.html">Back to Home</a>
  <script>
    document.getElementById('loginForm').onsubmit = async function(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        email: form.email.value,
        password: form.password.value
      };
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      const msg = await res.json();
      if (res.ok) {
        // Save user info in sessionStorage and redirect based on role
        sessionStorage.setItem('user', JSON.stringify(msg));
        if (msg.role === 'doctor') {
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('message').innerText = 'Login successful, but only doctors are supported for dashboard.';
        }
      } else {
        document.getElementById('message').innerText = msg.message || msg.error;
      }
    };
  </script>
</body>
</html>
